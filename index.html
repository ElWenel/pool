<! Greenland html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TIU Virtual</title>
    <style>
      :root {
        --bg: #f5f6fb;
        --primary: #d9d4f3;
        --danger: #e53935;
        --text-secondary: #666;
      }

      body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg);
        overflow-x: hidden;
        min-height: 100-vh;
      }

      /* HEADER */
      .header {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 20px;
        font-weight: bold;
        background: white;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      }

      .back {
        color: var(--danger);
        font-size: 24px;
        cursor: pointer;
      }

      .container {
        text-align: center;
        position: relative;
        z-index: 2;
        padding-bottom: 50px;
      }

      /* RELOJ Y FECHA */
      .time-box {
        margin: 40px auto 10px;
        padding: 12px 30px;
        background: var(--primary);
        border-radius: 12px;
        font-size: 28px;
        font-weight: bold;
        width: fit-content;
        color: #333;
      }

      .date {
        color: var(--text-secondary);
        margin-bottom: 40px;
        text-transform: capitalize;
      }

      /* AVATAR */
      .avatar {
        display: flex;
        justify-content: center;
        margin-bottom: -50px; /* Eleva el avatar sobre la tarjeta */
        position: relative;
        z-index: 4;
      }

      .avatar img {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        object-fit: cover;
        border: 5px solid white;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        background-color: #eee;
      }

      /* TARJETA DE DATOS */
      .card {
        background: white;
        width: 85%;
        max-width: 380px;
        margin: 0 auto;
        padding: 60px 20px 30px; /* Padding superior extra para el avatar */
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      }

      .name {
        color: var(--danger);
        font-weight: bold;
        font-size: 1.2rem;
        margin-bottom: 20px;
        text-transform: uppercase;
      }

      .info-group {
        margin-bottom: 15px;
      }

      .label {
        color: #999;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .value {
        font-weight: bold;
        font-size: 16px;
        color: #333;
      }

      .career {
        margin-top: 25px;
        font-weight: 800;
        color: #444;
        border-top: 1px solid #eee;
        padding-top: 15px;
      }

      .campus {
        margin-top: 8px;
        color: var(--text-secondary);
        font-size: 14px;
      }

      /* NUBES ANIMADAS */
      .cloud {
        position: fixed;
        background-image: url("nube.png"); /* Asegúrate de tener este archivo */
        background-size: contain;
        background-repeat: no-repeat;
        opacity: 0.6;
        animation: moveClouds linear infinite;
        z-index: 1;
        pointer-events: none;
      }

      /* Si no tienes nube.png, esto genera nubes blancas básicas */
      .cloud:not([src]) {
        background-color: white;
        border-radius: 50px;
      }

      .cloud1 { width: 120px; height: 40px; top: 10%; left: -150px; animation-duration: 15s; }
      .cloud2 { width: 180px; height: 60px; top: 25%; left: -200px; animation-duration: 22s; }
      .cloud3 { width: 100px; height: 35px; top: 60%; left: -120px; animation-duration: 18s; }
      .cloud4 { width: 150px; height: 50px; top: 80%; left: -180px; animation-duration: 25s; }

      @keyframes moveClouds {
        0% { transform: translateX(-200px); }
        100% { transform: translateX(120vw); }
      }
    </style>
  </head>
  <body>

    <div class="header">
      <div class="back" onclick="history.back()">‹</div>
      <div>TIU VIRTUAL</div>
    </div>

    <div class="container">
      <div class="time-box" id="clock">00:00:00</div>
      <div class="date" id="full-date">Cargando fecha...</div>

      <div class="avatar">
        <img src="avatar.jpg" alt="Avatar Usuario" onerror="this.src='https://via.placeholder.com/150/d9d4f3/ffffff?text=Avatar'">
      </div>

      <div class="card">
        <div class="name">POOL ANDERSON C*** S***</div>

        <div class="info-group">
          <div class="label">Código de alumno</div>
          <div class="value">U202213685</div>
        </div>

        <div class="info-group">
          <div class="label">ID Banner</div>
          <div class="value">N00946726</div>
        </div>

        <div class="career">ING. SISTEMAS DE SOFTWARE</div>
        <div class="campus">📍 Campus San Miguel</div>
      </div>
    </div>

    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
    <div class="cloud cloud4"></div>

    <script>
      function updateDateTime() {
        const now = new Date();
        
        // Actualizar Reloj
        const h = String(now.getHours()).padStart(2, "0");
        const m = String(now.getMinutes()).padStart(2, "0");
        const s = String(now.getSeconds()).padStart(2, "0");
        document.getElementById("clock").textContent = `${h}:${m}:${s}`;

        // Actualizar Fecha (Formato: Sábado, 16 May 2026)
        const options = { weekday: 'long', day: 'numeric', month: 'short', year: 'numeric' };
        let dateStr = now.toLocaleDateString('es-ES', options);
        // Quitar el punto que a veces pone JS en el mes (ej: "may.")
        document.getElementById("full-date").textContent = dateStr.replace('.', '');
      }

      // Ejecutar cada segundo
      setInterval(updateDateTime, 1000);
      updateDateTime();
    </script>
  </body>
</html>
